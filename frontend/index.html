<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SQL Learning IDE</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- CodeMirror 5 (reliable, single-file, no ESM dedupe headaches) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/material-darker.min.css" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.css" />

  <link rel="stylesheet" href="css/style.css" />
</head>
<body>
  <!-- ===== Top bar ===== -->
  <header class="topbar">
    <div class="brand">
      <span class="logo">◧</span>
      <span class="brand-name">SQL Learning IDE</span>
      <span class="brand-sub" id="dataset-name">— shop database</span>
    </div>
    <div class="topbar-right">
      <span class="badge" id="engine-badge" title="SQL execution engine">engine: …</span>
      <span class="badge" id="model-badge" title="Content & feedback model">qwen: …</span>
    </div>
  </header>

  <div class="layout">
    <!-- ===== Sidebar: course tree ===== -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-head">Course</div>
      <nav id="course-tree" class="course-tree"><div class="muted pad">Loading…</div></nav>
    </aside>

    <!-- ===== Lesson reading pane ===== -->
    <section class="lesson-pane">
      <div class="lesson-scroll" id="lesson-scroll">
        <div class="muted pad">Select a lesson.</div>
      </div>
    </section>

    <!-- ===== Workbench: editor + output ===== -->
    <section class="workbench">
      <div class="task-bar" id="task-bar">
        <span class="task-label">TASK</span>
        <span id="task-prompt" class="task-prompt">—</span>
      </div>

      <div class="editor-toolbar">
        <button class="btn btn-run" id="btn-run" title="Ctrl+Enter">▶ Run</button>
        <button class="btn" id="btn-explain" title="See how the engine executes it">⚙ Explain</button>
        <button class="btn btn-check" id="btn-check" title="Ctrl+Shift+Enter">✓ Check answer</button>
        <span class="spacer"></span>
        <button class="btn btn-ghost" id="btn-reset" title="Restore starter query">↺ Reset</button>
      </div>

      <div class="editor-wrap">
        <textarea id="editor"></textarea>
      </div>

      <div class="output">
        <div class="tabs">
          <button class="tab active" data-tab="results">Results</button>
          <button class="tab" data-tab="explain">Explain</button>
          <button class="tab" data-tab="feedback">AI Feedback</button>
          <span class="output-meta" id="output-meta"></span>
        </div>
        <div class="tab-panels">
          <div class="panel active" id="panel-results"><div class="muted pad">Run a query to see results.</div></div>
          <div class="panel" id="panel-explain"><div class="muted pad">Press <b>Explain</b> to see the query plan — how the engine interprets your SQL.</div></div>
          <div class="panel" id="panel-feedback"><div class="muted pad">Press <b>Check answer</b> for Qwen's feedback.</div></div>
        </div>
      </div>
    </section>
  </div>

  <!-- libs -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/sql/sql.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/show-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/hint/sql-hint.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/addon/edit/matchbrackets.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
